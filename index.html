    <!-- Modal for Carousel Vitae -->

            <div class="modal-gallery">

                <img src="" alt="Project Image" class="modal-img" id="modal-img">
                <button class="gallery-nav gallery-next" id="gallery-next">&rsaquo;</button>
                <div class="gallery-indicators" id="gallery-indicators"></div>
            </div>
            <div class="modal-info">
                <h3 id="modal-title">Project Title</h3>
                <span id="modal-date"
                    style="display: block; margin-bottom: 0.5rem; color: var(--accent-color); font-weight: 600; font-size: 0.85rem; text-transform: uppercase;"></span>
                <p id="modal-description">Project Description</p>
            </div>

    <!-- All Projects Gallery Modal -->
    <div class="modal-overlay" id="all-projects-modal" style="align-items: flex-start; padding-top: 4rem;">
        <div class="modal-content" style="max-width: 1200px; width: 95%; max-height: 85vh; overflow-y: auto;">
            <button class="modal-close" id="all-projects-close">&times;</button>
            <div
                style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;">
                <div>
                    <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">All Projects</h2>
                    <p style="color: var(--text-secondary);">Browse the complete portfolio archive.</p>
                </div>
                <input type="text" id="all-projects-search" placeholder="Search titles & descriptions..."
                    style="padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-primary); width: 100%; max-width: 300px; font-size: 1rem; outline: none; transition: var(--transition);">
            </div>

            <div id="all-projects-grid"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem;">
                <!-- Cards will be injected here -->
            </div>
        </div>
    </div>

    <script>
        // Modal Logic
        const modal = document.getElementById('cv-modal');
        const modalCloseBtn = document.getElementById('modal-close');
        const modalImg = document.getElementById('modal-img');
        const modalDate = document.getElementById('modal-date');
        const modalTitle = document.getElementById('modal-title');
        const modalDesc = document.getElementById('modal-description');
        const galleryPrev = document.getElementById('gallery-prev');
        const galleryNext = document.getElementById('gallery-next');
        const galleryIndicators = document.getElementById('gallery-indicators');

        let currentModalImages = [];
        let currentImageIndex = 0;

        function updateModalImage() {
            if (currentModalImages.length > 0) {
                modalImg.style.display = 'block';
                document.querySelector('.modal-gallery').style.display = 'flex';
                modalImg.src = currentModalImages[currentImageIndex];

                // Update indicators
                Array.from(galleryIndicators.children).forEach((dot, idx) => {
                    dot.classList.toggle('active', idx === currentImageIndex);
                });

                galleryPrev.style.display = currentModalImages.length > 1 ? 'block' : 'none';
                galleryNext.style.display = currentModalImages.length > 1 ? 'block' : 'none';
            } else {
                modalImg.style.display = 'none';
                document.querySelector('.modal-gallery').style.display = 'none';
                galleryPrev.style.display = 'none';
                galleryNext.style.display = 'none';
            }
        }

        galleryPrev.addEventListener('click', () => {
            currentImageIndex = (currentImageIndex - 1 + currentModalImages.length) % currentModalImages.length;
            updateModalImage();
        });

        galleryNext.addEventListener('click', () => {
            currentImageIndex = (currentImageIndex + 1) % currentModalImages.length;
            updateModalImage();
        });

        modalCloseBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.classList.remove('active');
        });

        let carouselItemsData = [];

        function initCarouselMarquee() {
            const screenWidth = window.innerWidth;

            [0, 1, 2].forEach(i => {
                const marqueeTrack = document.getElementById(`marquee-track-${i}`);
                if (marqueeTrack) {
                    const group = document.getElementById(`marquee-group-${i}`);

                    let groupWidth = group.offsetWidth;
                    if (groupWidth === 0) return; // skip empty groups

                    // 100% Continuous Scrolling Fix (Performance Safe): 
                    // Mathematically deduce required copies to avoid while-loop layout recalculation crashes.
                    const requiredWidth = screenWidth * 1.5;
                    if (groupWidth < requiredWidth) {
                        const originalChildren = Array.from(group.children);
                        const copiesNeeded = Math.ceil(requiredWidth / groupWidth) - 1;
                        for (let j = 0; j < copiesNeeded; j++) {
                            originalChildren.forEach(child => {
                                group.appendChild(child.cloneNode(true));
                            });
                        }
                    }

                    // Recalculate true physical width after cloning
                    groupWidth = group.offsetWidth;

                    // Calculate consistent speed independent of number of projects
                    const speedPxPerSec = 75; // Adjust this value for base pixel velocity
                    const duration = Math.max(groupWidth / speedPxPerSec, 5);
                    group.style.animationDuration = duration + 's';

                    // Provide a random negative delay so each track starts simultaneously at totally different aesthetic phases
                    const randomDelay = -(Math.random() * duration);
                    group.style.animationDelay = randomDelay + 's';

                    // Clone the group twice to guarantee smooth infinite scrolling on ultra-wide screens
                    const clone1 = group.cloneNode(true);
                    const clone2 = group.cloneNode(true);

                    // Give the clones the same specific speed and offsets
                    clone1.style.animationDuration = duration + 's';
                    clone2.style.animationDuration = duration + 's';
                    clone1.style.animationDelay = randomDelay + 's';
                    clone2.style.animationDelay = randomDelay + 's';

                    // Accessibility fix for duplicates
                    clone1.setAttribute("aria-hidden", "true");
                    clone2.setAttribute("aria-hidden", "true");
                    clone1.id = ""; // remove duplicate id
                    clone2.id = ""; // remove duplicate id

                    marqueeTrack.appendChild(clone1);
                    marqueeTrack.appendChild(clone2);
                }
            });

            // Pause marquee on hover or touch
            const carouselContainer = document.querySelector('.carousel-container');
            const groups = carouselContainer.querySelectorAll('.marquee-group');

            const pauseMarquee = () => groups.forEach(g => g.style.animationPlayState = 'paused');
            const playMarquee = () => groups.forEach(g => g.style.animationPlayState = 'running');

            carouselContainer.addEventListener('mouseenter', pauseMarquee);
            carouselContainer.addEventListener('mouseleave', playMarquee);
            carouselContainer.addEventListener('touchstart', pauseMarquee, { passive: true });
            carouselContainer.addEventListener('touchend', playMarquee, { passive: true });
        }

        // Event delegation for opening modals
        document.querySelector('.carousel-container').addEventListener('click', (e) => {
            const card = e.target.closest('.cv-card');
            if (card) {
                const index = card.getAttribute('data-index');
                if (index !== null) {
                    const data = carouselItemsData[parseInt(index, 10)];
                    if (data) openModal(data);
                }
            }
        });

        function openModal(data) {
            modalTitle.innerHTML = data.links ? `<a href="${data.links}" target="_blank" rel="noopener noreferrer">${data.title}</a>` : data.title;
            modalDate.textContent = data.date || '';
            modalDate.style.display = data.date ? 'block' : 'none';
            modalDesc.innerHTML = data.desc.replace(/\\n|\n/g, '<br/>');

            currentModalImages = data.pictures.length > 0 ? data.pictures : (data.thumbnail ? [data.thumbnail] : []);
            currentImageIndex = 0;

            galleryIndicators.innerHTML = '';
            if (currentModalImages.length > 1) {
                currentModalImages.forEach((_, idx) => {
                    const dot = document.createElement('div');
                    dot.className = 'indicator-dot';
                    dot.addEventListener('click', () => {
                        currentImageIndex = idx;
                        updateModalImage();
                    });
                    galleryIndicators.appendChild(dot);
                });
            }

            updateModalImage();
            modal.classList.add('active');
        }

        async function fetchCarouselData() {
            try {
                // Fetch dynamic, newest data forcibly bypassing GitHub Page's aggressive cache
                const res = await fetch('data/portfolio.json?t=' + Date.now().toString());
                const data = await res.json();

                const groups = [
                    document.getElementById('marquee-group-0'),
                    document.getElementById('marquee-group-1'),
                    document.getElementById('marquee-group-2')
                ];
                groups.forEach(g => g.innerHTML = '');

                let items = data.projects.filter(row => row.unlisted !== true && row.title && row.title.trim() !== '');

                // Reverse to display chronologically (assumes JSON is newest-at-top)
                items.reverse();

                if (items.length === 0) {
                    groups[0].innerHTML = '<p style="color: var(--text-secondary);">No projects available at the moment.</p>';
                    return;
                }

                carouselItemsData = items.map(row => {
                    const title = (row.title || '').trim();
                    const desc = (row.description || '').trim();
                    const links = (row.link || '').trim();
                    const date = (row.date || '').trim();
                    const pictures = row.pictures || [];

                    const thumbnail = row.thumbnail || (pictures.length > 0 ? pictures[0] : null);

                    return { title, desc, links, date, pictures, thumbnail };
                });

                carouselItemsData.forEach((item, index) => {
                    let descPreview = item.desc.length > 90 ? item.desc.substring(0, 90) + '...' : item.desc;

                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'carousel-item';
                    itemDiv.innerHTML = `
                        <div class="card cv-card" data-index="${index}">
                            ${item.thumbnail ? `<img src="${item.thumbnail}" alt="${item.title}" class="carousel-img">` : `<div class="carousel-img" style="display:flex; align-items:center; justify-content:center; color:var(--text-secondary); font-weight:700; letter-spacing:0.1em; font-size:0.95rem;">[NO IMAGE]</div>`}
                            <h3 style="margin-top: 1rem;">${item.title}</h3>
                            ${item.date ? `<span class="blog-date" style="display: block; margin-top: -0.25rem; margin-bottom: 0.5rem;">${item.date}</span>` : ''}
                            <p>${descPreview}</p>
                        </div>
                    `;
                    groups[index % 3].appendChild(itemDiv);
                });

                initCarouselMarquee();
            } catch (err) {
                console.error('Error fetching CV JSON Data:', err);
                document.getElementById('marquee-group-0').innerHTML = '<p style="color: var(--text-secondary);">Failed to load portfolio items.</p>';
            }
        }

        fetchCarouselData();

        // All Projects Gallery Logic
        const allProjectsModal = document.getElementById('all-projects-modal');
        const viewAllBtn = document.getElementById('open-gallery-btn');
        const allProjectsClose = document.getElementById('all-projects-close');
        const allProjectsGrid = document.getElementById('all-projects-grid');
        const allProjectsSearch = document.getElementById('all-projects-search');

        document.getElementById('all-projects-search').addEventListener('focus', function () { this.style.borderColor = 'var(--accent-color)'; });
        document.getElementById('all-projects-search').addEventListener('blur', function () { this.style.borderColor = 'var(--border-color)'; });

        viewAllBtn.addEventListener('click', (e) => {
            e.preventDefault();
            allProjectsSearch.value = '';
            renderAllProjectsGallery('');
            allProjectsModal.classList.add('active');
            allProjectsModal.scrollTop = 0;
        });

        allProjectsClose.addEventListener('click', () => allProjectsModal.classList.remove('active'));
        allProjectsModal.addEventListener('click', (e) => {
            if (e.target === allProjectsModal) allProjectsModal.classList.remove('active');
        });

        allProjectsSearch.addEventListener('input', (e) => {
            renderAllProjectsGallery(e.target.value.toLowerCase());
        });

        function renderAllProjectsGallery(query) {
            allProjectsGrid.innerHTML = '';
            const filtered = carouselItemsData.filter(item => {
                const txt = (item.title + ' ' + item.desc).toLowerCase();
                return txt.includes(query);
            });

            if (filtered.length === 0) {
                allProjectsGrid.innerHTML = '<p style="color: var(--text-secondary); grid-column: 1 / -1; text-align: center; padding: 4rem 1rem;">No projects matched your search.</p>';
                return;
            }

            filtered.forEach((item) => {
                let descPreview = item.desc.length > 100 ? item.desc.substring(0, 100) + '...' : item.desc;
                const card = document.createElement('div');
                card.className = 'card cv-card';
                card.style.cursor = 'pointer';
                card.style.height = '100%';

                const imgTag = item.thumbnail
                    ? `<img src="${item.thumbnail}" alt="${item.title}" class="carousel-img" style="aspect-ratio: 16/9;">`
                    : `<div class="carousel-img" style="display:flex; align-items:center; justify-content:center; color:var(--text-secondary); font-weight:700; letter-spacing:0.1em; font-size:0.95rem; aspect-ratio: 16/9; background-color: var(--surface-color);">[NO IMAGE]</div>`;

                card.innerHTML = `
                    ${imgTag}
                    <div style="display: flex; flex-direction: column; flex-grow: 1;">
                        <h3 style="margin-top: 1rem;">${item.title}</h3>
                        ${item.date ? `<span class="blog-date" style="display: block; margin-top: -0.25rem; margin-bottom: 0.5rem;">${item.date}</span>` : ''}
                        <p style="margin-bottom: 0;">${descPreview}</p>
                    </div>
                `;

                card.addEventListener('click', () => {
                    openModal(item);
                });

                allProjectsGrid.appendChild(card);
            });
        }

        // Fetch Medium Posts
        async function fetchMediumBlogs() {
            const blogGrid = document.getElementById('medium-blog-grid');
            const viewAllLink = document.querySelector('#blog .view-all');

            // Link directly to the Medium profile as a fallback/default
            if (viewAllLink) {
                viewAllLink.href = 'https://medium.com/@fidelisdomu';
                viewAllLink.target = '_blank';
                viewAllLink.rel = 'noopener noreferrer';
            }

            try {
                // Using rss2json API to fetch your Medium RSS feed bypassing CORS issues
                const res = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://medium.com/feed/@fidelisdomu');
                const data = await res.json();

                if (data.status === 'ok' && data.items.length > 0) {
                    blogGrid.innerHTML = ''; // Clear loading text

                    // Show up to 3 recent posts
                    const posts = data.items.slice(0, 3);

                    posts.forEach(post => {
                        // Create a temporary element to strip HTML tags from content
                        const tmp = document.createElement('div');
                        tmp.innerHTML = post.description;
                        const textContent = tmp.textContent || tmp.innerText || '';

                        // Extract a short preview text safely
                        let summary = textContent.trim().substring(0, 110);
                        if (textContent.length > 110) summary += '...';

                        // Format date
                        const pubDate = new Date(post.pubDate).toLocaleDateString('en-US', {
                            month: 'short', day: 'numeric', year: 'numeric'
                        });

                        const card = document.createElement('div');
                        card.className = 'card blog-card';
                        card.innerHTML = `
                            <span class="blog-date">${pubDate}</span>
                            <h3>${post.title}</h3>
                            <p>${summary}</p>
                            <a href="${post.link}" class="read-more" target="_blank" rel="noopener noreferrer">Read More &rarr;</a>
                        `;
                        blogGrid.appendChild(card);
                    });
                } else {
                    // Render elegant placeholder cards when there are no public Medium posts yet
                    blogGrid.innerHTML = `
                        <div class="card blog-card">
                            <span class="blog-date">Coming Soon</span>
                            <h3>The beginning of Domu Fidelis</h3>
                            <p>No public stories have been published to the Medium feed yet. Check back later for the first official post!</p>
                            <a href="https://medium.com/@fidelisdomu" class="read-more" target="_blank" rel="noopener noreferrer">Visit Medium Profile &rarr;</a>
                        </div>
                        <div class="card blog-card" style="opacity: 0.6;">
                            <span class="blog-date">Upcoming</span>
                            <h3>Workspace aesthetics</h3>
                            <p>Insights on refining design, development, and minimalism. Currently in drafting phases...</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error fetching Medium blogs:', error);
                blogGrid.innerHTML = '<p style="color: var(--text-secondary); width: 100%;">Failed to load posts. <a href="https://medium.com/@fidelisdomu" target="_blank" style="color: var(--accent-color);">Visit my Medium profile directly</a>.</p>';
            }
        }

        fetchMediumBlogs();

        // Parallax background logic
        window.addEventListener('scroll', () => {
            document.body.style.setProperty('--scroll-offset', `${window.scrollY}px`);
        });

        // Netlify Identity Redirect
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on("init", user => {
                if (!user) {
                    window.netlifyIdentity.on("login", () => {
                        document.location.href = "/admin/";
                    });
                }
            });
        }
    </script>
</body>

</html>
